 <div class="ksd7m2_section">

                        </button>
                        <button class="hyg9-modal-nav hyg9-modal-next hidden" id="modalNext" type="button" aria-label="Sonraki görsel" onclick="changeModalImage(1)">

                        </button>

    <script src="./assets/js/bootstrap.min.js"></script>
    <script>
        const products = [
            {
                id: 1,
                name: 'El Yıkama Lavabo Çözümleri',
                category: 'elhijyen',
                image: './assets/img/hijyen/endustriyel-el-yikama-lavabosu.webp',
                images: [
                    './assets/img/hijyen/el-yikama-lavabo.webp',
                    './assets/img/hijyen/endustriyel-el-yikama-lavabosu.webp'
                ],
                alt: 'Ceka el yıkama lavabo çözümleri',
                title: 'Ceka el yıkama lavabo çözümleri',
                description: 'El yıkama lavabo çözümleri; sabunluk, sensörlü batarya ve paslanmaz gövde seçenekleriyle kesim alanında hijyenik personel akışını destekler.',
                badge: 'Hijyen'
            },
            {
                id: 2,
                name: 'Bıçak Sterilizasyon Çözümleri',
                category: 'sterilizasyon',
                image: './assets/img/hijyen/bicak-sterilizasyon.webp',
                images: [
                    './assets/img/hijyen/sterilizator.webp',                    
                    './assets/img/hijyen/bicak-sterilizasyon.webp',
                    './assets/img/hijyen/bicak-sterilizasyon-2.webp',
                ],
                alt: 'Ceka bıçak sterilizasyon çözümleri',
                title: 'Ceka bıçak sterilizasyon çözümleri',
                description: 'Bıçak sterilizasyon çözümleri; sıcak su kontrollü tank, kabin ve kompakt gövde seçenekleriyle ekipmanların hijyen standartlarına uygun şekilde dezenfekte edilmesini sağlar.',
                badge: 'Hijyen'
            },
            {
                id: 3,
                name: 'Hijyenik Geçiş Turnikesi',
                category: 'gecis',
                image: './assets/img/hijyen/hijyenik-gecis-turnike.webp',
                alt: 'Ceka hijyenik geçiş turnikesi',
                title: 'Ceka hijyenik geçiş turnikesi',
                description: 'Turnike kontrollü hijyen bariyeri; el yıkama ve taban dezenfeksiyonu tamamlanmadan geçişe izin vermez.',
                badge: 'Kontrollü Geçiş'
            },
            {
                id: 4,
                name: 'Yıkama Tezgahı',
                category: 'yikama',
                image: './assets/img/hijyen/yikama-unitesi-7.webp',
                images: [
                    './assets/img/hijyen/yikama-unitesi-7.webp',
                    './assets/img/hijyen/yikama-unitesi-6.webp',
                    './assets/img/hijyen/yikama-unitesi-2.webp'
                ],
                alt: 'Ceka Yıkama Tezgahı',
                title: 'Ceka Yıkama Tezgahı',
                description: 'Çift Yıkama Tezgahı; köpük ve dezenfektan uygulamalarını hızlıca yaparak alan hijyenini korur.',
                badge: 'Hijyen'
            },
            {
                id: 5,
                name: 'Dizden Vurmalı Hijyenik Lavabo ve Sterilizatör',
                category: 'elhijyen',
                image: './assets/img/hijyen/endustriyel-el-yikama-lavabosu-ve-bicak.webp',
                alt: 'Ceka Dizden Vurmalı Hijyenik Lavabo ve Sterilizatör',
                title: 'Ceka Dizden Vurmalı Hijyenik Lavabo ve Sterilizatör',
                description: 'İki gözlü el yıkama istasyonu entegre bıçak sterilizatörüyle birlikte; yoğun operasyonlar için ideal.',
                badge: 'Hijyen'
            },
            {
                id: 6,
                name: 'Kanama Kanalı',
                category: 'drenaj',
                image: './assets/img/hijyen/kanama-su-kanali.webp',
                images: [
                    './assets/img/hijyen/kanama-su-kanali.webp',
                    './assets/img/hijyen/kanama-su-kanali-2.webp',
                    './assets/img/hijyen/buyukbas-kanama-kanali.webp'
                ],
                alt: 'Ceka kanama kanalı',
                title: 'Ceka kanama kanalı',
                description: 'Kanama kanalı; yüksek debili sıvı yönetimi, kolay temizlenen yüzeyler ve düzenli zemin akışı ile hijyen standardını güçlendirir.',
                badge: 'Hijyen'
            },
        ];

        const currentImageIndices = products.map(() => 0);
        let activeModalIndex = null;
        let activeModalImageIndex = 0;

        function getProductImages(product) {
            if (Array.isArray(product.images) && product.images.length) return product.images;
            if (product.image) return [product.image];
            return [];
        }

        function getCurrentProductImage(product, index) {
            const images = getProductImages(product);
            if (!images.length) return null;
            const normalizedIndex = ((index % images.length) + images.length) % images.length;
            return images[normalizedIndex];
        }

        function hasProductGallery(product) {
            return getProductImages(product).length > 1;
        }

        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = '';

            products.forEach((product, index) => {
                const card = document.createElement('div');
                card.className = 'lpt2j9_product-card fade-in';
                card.style.animationDelay = (index * 0.1) + 's';
                const productIndex = products.findIndex(p => p.id === product.id);
                const images = getProductImages(product);
                const currentImage = getCurrentProductImage(product, currentImageIndices[productIndex]);
                const galleryControls = hasProductGallery(product)
                    ? `<button class="hyg9-nav hyg9-nav-prev" type="button" aria-label="${product.name} önceki görsel" onclick="event.stopPropagation(); changeProductImage(${productIndex}, -1);"><i class="bi bi-chevron-left"></i></button>
                       <button class="hyg9-nav hyg9-nav-next" type="button" aria-label="${product.name} sonraki görsel" onclick="event.stopPropagation(); changeProductImage(${productIndex}, 1);"><i class="bi bi-chevron-right"></i></button>
                       <span class="hyg9-count" id="galleryCount-${productIndex}">${currentImageIndices[productIndex] + 1}/${images.length}</span>`
                    : '';
                card.innerHTML = `
                    <div class="jkd4r6_image-wrapper">
                        <img loading="lazy" id="productImg-${productIndex}" src="${currentImage}" alt="${product.alt}" title="${product.title}">
                        ${galleryControls}
                        <span class="gty8n3_badge">${product.badge}</span>
                    </div>
                    <div class="wqp5m1_content">
                        <h3>${product.name}</h3>
                        <p>${product.description}</p>
                        <div class="bxn7f2_footer">
                            <button class="tzk3p8_btn tzk3p8_btn-primary" onclick="openModal(${product.id})">
                                <i class="bi bi-eye"></i> Detaylar
                            </button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function updateCardImage(index) {
            const product = products[index];
            const images = getProductImages(product);
            const currentImage = getCurrentProductImage(product, currentImageIndices[index]);
            const img = document.getElementById(`productImg-${index}`);
            const count = document.getElementById(`galleryCount-${index}`);

            if (img && currentImage) {
                img.src = currentImage;
                img.alt = product.alt;
                img.title = product.title;
            }
            if (count && images.length) {
                count.textContent = `${currentImageIndices[index] + 1}/${images.length}`;
            }
        }

        function changeProductImage(index, direction) {
            const images = getProductImages(products[index]);
            if (images.length < 2) return;
            currentImageIndices[index] = (currentImageIndices[index] + direction + images.length) % images.length;
            updateCardImage(index);
            if (activeModalIndex === index) {
                activeModalImageIndex = currentImageIndices[index];
                updateModalImage();
            }
        }

        function updateModalImage() {
            const modalImg = document.getElementById('modalImage');
            const modalPrev = document.getElementById('modalPrev');
            const modalNext = document.getElementById('modalNext');
            const modalCount = document.getElementById('modalCount');
            const product = products[activeModalIndex];
            const images = getProductImages(product);

            if (!images.length) return;

            modalImg.src = images[activeModalImageIndex];
            modalImg.alt = product.alt;
            modalImg.title = product.title;

            if (images.length > 1) {
                modalPrev.classList.remove('hidden');
                modalNext.classList.remove('hidden');
                modalCount.classList.remove('hidden');
                modalCount.textContent = `${activeModalImageIndex + 1}/${images.length}`;
            } else {
                modalPrev.classList.add('hidden');
                modalNext.classList.add('hidden');
                modalCount.classList.add('hidden');
            }
        }

        function openModal(productId) {
            const product = products.find(p => p.id === productId);
            activeModalIndex = products.findIndex(p => p.id === productId);
            activeModalImageIndex = currentImageIndices[activeModalIndex];
            document.getElementById('modalTitle').textContent = product.name;
            document.getElementById('modalDescription').textContent = product.description;
            updateModalImage();
            new bootstrap.Modal(document.getElementById('productModal')).show();
        }

        function changeModalImage(direction) {
            if (activeModalIndex === null) return;
            const images = getProductImages(products[activeModalIndex]);
            if (images.length < 2) return;
            activeModalImageIndex = (activeModalImageIndex + direction + images.length) % images.length;
            currentImageIndices[activeModalIndex] = activeModalImageIndex;
            updateModalImage();
            updateCardImage(activeModalIndex);
        }

        renderProducts();
    </script>
<script src="./assets/js/main.js"></script>
